name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff mypy
          pip install discord.py aiohttp pillow

      - name: Lint with ruff
        run: ruff check bot tests || true

      - name: Type check (utils + data + services)
        run: mypy --ignore-missing-imports bot/utils bot/data bot/services || true

      - name: Run tests
        run: pytest -q
